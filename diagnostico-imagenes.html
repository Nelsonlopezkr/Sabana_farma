<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Diagnóstico de Imágenes — Interno</title>
<style>
  body { font-family:'Segoe UI',sans-serif; background:#f4f6fb; color:#263238; padding:1rem; max-width:820px; margin:0 auto; }
  h1 { font-size:1.15rem; color:#0A2A66; }
  .check { background:#fff; border-radius:12px; padding:1rem; margin:.8rem 0; box-shadow:0 1px 4px rgba(10,42,102,.08); }
  .ok    { border-left:5px solid #2e7d32; }
  .mal   { border-left:5px solid #c62828; }
  .warn  { border-left:5px solid #e65100; }
  .check b { display:block; margin-bottom:.3rem; }
  .check p { font-size:.85rem; line-height:1.5; margin:.2rem 0; }
  code { background:#eceff1; padding:.1rem .4rem; border-radius:6px; font-size:.8rem; }
  table { width:100%; border-collapse:collapse; font-size:.78rem; margin-top:.5rem; }
  td, th { padding:.35rem .5rem; border-bottom:1px solid #eceff1; text-align:left; }
  .si { color:#2e7d32; font-weight:800; } .no { color:#c62828; font-weight:800; }
  img.mini { width:34px; height:34px; object-fit:contain; vertical-align:middle; background:#fff; border-radius:6px; }
</style>
</head>
<body>
<h1>🔬 Diagnóstico de Imágenes del Catálogo</h1>
<p style="font-size:.8rem;color:#546e7a">Colocar en la raíz del proyecto (junto a productos.html) y abrir con doble clic.</p>
<div id="resultados"><div class="check"><b>Ejecutando pruebas…</b></div></div>

<script src="js/productos-data.js"></script>
<script src="js/catalogo.js"></script>
<script>
(function() {
  'use strict';
  var R = document.getElementById('resultados');
  var html = '';

  function bloque(clase, titulo, cuerpo) {
    html += '<div class="check ' + clase + '"><b>' + titulo + '</b>' + cuerpo + '</div>';
  }

  /* ── PRUEBA 1: ¿cargó js/catalogo.js? ── */
  var cargoCatalogo = (typeof onImgError === 'function' && typeof resolverImagen === 'function');
  if (!cargoCatalogo) {
    bloque('mal', '❌ js/catalogo.js NO cargó',
      '<p>Este archivo de diagnóstico debe estar en la <b>raíz</b> del proyecto (junto a productos.html). Verifica su ubicación.</p>');
    R.innerHTML = html;
    return;
  }
  bloque('ok', '✓ js/catalogo.js cargado', '<p>Las funciones de imagen están disponibles.</p>');

  /* ── PRUEBA 2: ¿el catalogo.js cargado tiene el FIX? ── */
  var tieneFix = onImgError.toString().indexOf('data-slug') !== -1;
  if (tieneFix) {
    bloque('ok', '✓ El FIX está presente en js/catalogo.js',
      '<p>La función onImgError ya reconstruye el contexto desde data-slug.</p>');
  } else {
    bloque('mal', '❌ El FIX NO está en el archivo que carga la página',
      '<p><b>Esta es la causa.</b> El archivo corregido no reemplazó a <code>js/catalogo.js</code>. ' +
      'Posiblemente quedó en la raíz del proyecto o en Descargas.</p>' +
      '<p><b>Solución:</b> copia el catalogo.js corregido DENTRO de la carpeta <code>js/</code>, ' +
      'reemplazando el existente, y recarga esta página.</p>');
  }

  /* ── PRUEBA 3: cadena de fallback con productos reales ── */
  if (typeof CATALOGO === 'undefined') {
    bloque('mal', '❌ CATALOGO no disponible', '<p>js/productos-data.js no cargó.</p>');
    R.innerHTML = html;
    return;
  }

  /* Tomar hasta 12 productos SIN ruta directa en los datos (dependen del slug) */
  var muestra = [];
  for (var i = 0; i < CATALOGO.length && muestra.length < 12; i++) {
    var p = CATALOGO[i];
    var tieneRutaDirecta = (p.imagen && p.imagen.trim()) ||
      (Array.isArray(p.variantes) && p.variantes.some(function(v){ return v.imagen && v.imagen.trim(); }));
    if (!tieneRutaDirecta) muestra.push(p);
  }

  var contFila = document.createElement('div');
  var filas = [];
  var pendientes = muestra.length;

  muestra.forEach(function(p, idx) {
    /* Replicar EXACTAMENTE lo que hace la card: src inicial + onerror inline */
    var wrap = document.createElement('span');
    wrap.innerHTML = '<img class="mini" src="' + resolverImagen(p) + '"' +
      ' data-slug="' + slugProducto(p.nombre) + '" data-cat="' + (p.categoria || '') + '"' +
      ' onerror="onImgError(this,null,0)">';
    var img = wrap.firstChild;
    contFila.appendChild(img);
    filas.push({ p: p, img: img });
  });

  setTimeout(function() {
    var okCount = 0, tabla = '<table><tr><th></th><th>Producto</th><th>URL final</th><th>Cargó</th></tr>';
    filas.forEach(function(f) {
      var cargo = f.img.naturalWidth > 0 && f.img.src.indexOf('data:image') === -1;
      var esIcono = f.img.src.indexOf('img/categorias/') !== -1 || f.img.src.indexOf('data:image') !== -1;
      if (cargo && !esIcono) okCount++;
      var urlCorta = (f.img.src || '').split('/').slice(-2).join('/').substring(0, 55);
      tabla += '<tr><td>' + f.img.outerHTML + '</td><td>' + f.p.nombre.substring(0, 38) + '</td>' +
        '<td><code>' + urlCorta + '</code></td>' +
        '<td class="' + (cargo && !esIcono ? 'si">SÍ' : (esIcono ? 'no">ícono/fallback' : 'no">NO')) + '</td></tr>';
    });
    tabla += '</table>';

    var clase = okCount > 0 ? 'ok' : 'warn';
    bloque(clase, '🧪 Prueba real con ' + filas.length + ' productos sin ruta en los datos (solo slug)',
      '<p>Imágenes que cargaron desde archivo por slug: <b>' + okCount + ' / ' + filas.length + '</b>. ' +
      'Nota: los productos de esta muestra pueden simplemente no tener imagen descargada aún — ' +
      'lo importante es que la URL final termine en <code>.jpg</code> (fallback funcionó) ' +
      'o muestre el ícono de categoría, y NUNCA quede en <code>.webp</code> rota.</p>' + tabla);

    R.innerHTML = html;
  }, 3000);

  R.innerHTML = html + '<div class="check"><b>⏳ Probando carga de imágenes reales (3 segundos)…</b></div>';
})();
</script>
</body>
</html>
